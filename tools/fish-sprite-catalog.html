<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Sprite Catalog — items_sheet.png</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #b0b0b0;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  padding: 16px;
  min-height: 100vh;
}
h1 {
  color: #4af;
  font-size: 20px;
  margin-bottom: 12px;
  border-bottom: 1px solid #333;
  padding-bottom: 8px;
}
h2 {
  color: #4af;
  font-size: 16px;
  padding: 10px 14px;
  border-bottom: 1px solid #333;
}

/* Section wrapper */
.section {
  border: 2px solid #1565c0;
  border-radius: 6px;
  margin-bottom: 20px;
  background: #0d0d0d;
}
.section.current { border-color: #4af; }
.section.extras { border-color: #fa8; }
.section.extras h2 { color: #fa8; }
.section.row-scan { border-color: #8f8; }
.section.row-scan h2 { color: #8f8; }

.section-desc {
  color: #666;
  font-size: 11px;
  padding: 4px 14px 8px;
}

/* Fish card grid */
.fish-grid {
  display: flex;
  flex-wrap: wrap;
  padding: 10px;
  gap: 10px;
}

/* Individual fish card */
.fish-card {
  width: 140px;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: #111;
  transition: border-color 0.2s;
}
.fish-card:hover { border-color: #4af; }
.fish-card .sprite-big {
  width: 64px;
  height: 64px;
  image-rendering: pixelated;
  background-repeat: no-repeat;
  cursor: crosshair;
}
.fish-card .fish-name {
  color: #4af;
  font-weight: bold;
  font-size: 13px;
  text-align: center;
}
.fish-card .fish-meta {
  font-size: 10px;
  color: #666;
  text-align: center;
  line-height: 1.4;
}
.fish-card .fish-coord {
  font-size: 10px;
  color: #888;
  font-family: monospace;
}
.fish-card.mismatch { border-color: #f44; background: #1a0808; }
.fish-card.ok { border-color: #4a4; }

/* Extra items card (smaller) */
.extra-card {
  width: 100px;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: #111;
  transition: border-color 0.2s;
}
.extra-card:hover { border-color: #fa8; }
.extra-card .sprite-med {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
  background-repeat: no-repeat;
  cursor: crosshair;
}
.extra-card .item-id {
  font-size: 10px;
  color: #555;
}
.extra-card .item-name {
  font-size: 11px;
  color: #ddd;
  text-align: center;
}

/* Row scan cards */
.row-card {
  width: 80px;
  border: 1px solid #222;
  border-radius: 3px;
  padding: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: #111;
}
.row-card .sprite-sm {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
  background-repeat: no-repeat;
}
.row-card .rc-id {
  font-size: 9px;
  color: #555;
}
.row-card.in-use { border-color: #4af; background: #0a1520; }
.row-card.in-use .rc-id { color: #4af; }

/* Zoom tooltip */
.zoom-tooltip {
  position: fixed;
  width: 128px;
  height: 128px;
  image-rendering: pixelated;
  background-repeat: no-repeat;
  border: 2px solid #4af;
  background-color: #0a0a0a;
  pointer-events: none;
  z-index: 9999;
  display: none;
  border-radius: 3px;
  box-shadow: 0 0 12px rgba(68, 170, 255, 0.3);
}

/* Status bar */
.status-bar {
  background: #111;
  border: 1px solid #333;
  padding: 8px 14px;
  margin-bottom: 16px;
  border-radius: 3px;
  color: #888;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.status-bar .val { font-weight: bold; color: #4af; }

/* Row label */
.row-label {
  color: #888;
  font-size: 12px;
  padding: 8px 14px 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<h1>Fish Sprite Catalog — items_sheet.png</h1>

<div class="status-bar" id="status-bar">
  <span>Current fish: <span class="val">12</span></span>
  <span>Sheet: <span class="val">items_sheet.png (576x560, 16px tiles)</span></span>
  <span>Fish rows: <span class="val">29-30 (y=464-495)</span></span>
</div>

<div id="current-section"></div>
<div id="row-scan-section"></div>
<div id="extras-section"></div>
<div class="zoom-tooltip" id="zoom-tooltip"></div>

<script>
(function() {
  'use strict';

  var TILE = 16;
  var COLS = 36;
  var SHEET_W = 576;
  var SHEET_H = 560;
  var SHEET_PATH = '../static/images/skills/items_sheet.png';

  // Current FISH_SPRITES from skills.js
  var CURRENT_FISH = [
    { name: 'Minnow',     level: 1,  hp: 1, xp: 8,   x: 0,   y: 464 },
    { name: 'Shrimp',     level: 5,  hp: 1, xp: 12,  x: 32,  y: 464 },
    { name: 'Perch',      level: 10, hp: 2, xp: 18,  x: 64,  y: 464 },
    { name: 'Trout',      level: 20, hp: 2, xp: 30,  x: 96,  y: 464 },
    { name: 'Bass',       level: 30, hp: 3, xp: 50,  x: 128, y: 464 },
    { name: 'Salmon',     level: 40, hp: 3, xp: 80,  x: 160, y: 464 },
    { name: 'Catfish',    level: 50, hp: 3, xp: 120, x: 208, y: 464 },
    { name: 'Swordfish',  level: 60, hp: 4, xp: 180, x: 0,   y: 480 },
    { name: 'Lobster',    level: 65, hp: 4, xp: 220, x: 48,  y: 480 },
    { name: 'Shark',      level: 75, hp: 5, xp: 320, x: 112, y: 480 },
    { name: 'Anglerfish', level: 85, hp: 5, xp: 500, x: 176, y: 480 },
    { name: 'Leviathan',  level: 95, hp: 5, xp: 800, x: 240, y: 480 }
  ];

  // Build set of used coordinates for highlighting
  var usedCoords = {};
  for (var f = 0; f < CURRENT_FISH.length; f++) {
    usedCoords[CURRENT_FISH[f].x + ',' + CURRENT_FISH[f].y] = CURRENT_FISH[f].name;
  }

  // Extra fishing-related items (bait, nets, rods, shells, seafood)
  // Row 12 (y=192): shells, crabs, seafood
  // Row 30 (y=480): more fish + shells/starfish/coral at end
  var EXTRA_ITEMS = [
    // Row 12: Shells & Seafood
    { id: 433, name: 'Crab',           x: 0,   y: 192 },
    { id: 434, name: 'Shell (pink)',    x: 16,  y: 192 },
    { id: 435, name: 'Shell (spiral)', x: 32,  y: 192 },
    { id: 436, name: 'Shell (conch)',  x: 48,  y: 192 },
    { id: 437, name: 'Stingray (red)', x: 64,  y: 192 },
    { id: 438, name: 'Stingray (orange)', x: 80, y: 192 },
    { id: 439, name: 'Jellyfish',      x: 96,  y: 192 },
    { id: 440, name: 'Squid',          x: 112, y: 192 },
    { id: 441, name: 'Octopus',        x: 128, y: 192 },
    { id: 442, name: 'Snail',          x: 144, y: 192 },
    { id: 443, name: 'Seahorse',       x: 160, y: 192 },
    { id: 444, name: 'Starfish',       x: 176, y: 192 },
    { id: 445, name: 'Coral (red)',    x: 192, y: 192 },
    { id: 446, name: 'Coral (blue)',   x: 208, y: 192 },
    { id: 447, name: 'Seaweed',        x: 224, y: 192 },
    { id: 448, name: 'Pearl',          x: 240, y: 192 },
    // Row 30 extras (past the fish): shells, starfish, coral
    { id: 1081, name: 'Shell A',       x: 0,   y: 496 },
    { id: 1082, name: 'Shell B',       x: 16,  y: 496 },
    { id: 1083, name: 'Shell C',       x: 32,  y: 496 },
    { id: 1084, name: 'Starfish A',    x: 48,  y: 496 },
    { id: 1085, name: 'Starfish B',    x: 64,  y: 496 },
    { id: 1086, name: 'Coral A',       x: 80,  y: 496 },
    { id: 1087, name: 'Coral B',       x: 96,  y: 496 },
    { id: 1088, name: 'Sea Plant',     x: 112, y: 496 }
  ];

  // Preload sheet
  var sheetImg = new Image();
  sheetImg.src = SHEET_PATH;

  var zoomTip = document.getElementById('zoom-tooltip');

  // ========= SECTION 1: Current Fish Sprites =========
  function buildCurrentFish() {
    var container = document.getElementById('current-section');
    var section = document.createElement('div');
    section.className = 'section current';

    var h2 = document.createElement('h2');
    h2.textContent = 'Current Fish Sprites (from FISH_SPRITES in skills.js)';
    section.appendChild(h2);

    var desc = document.createElement('div');
    desc.className = 'section-desc';
    desc.textContent = 'Review each fish — does the sprite match the name? Check for visual issues.';
    section.appendChild(desc);

    var grid = document.createElement('div');
    grid.className = 'fish-grid';

    for (var i = 0; i < CURRENT_FISH.length; i++) {
      var fish = CURRENT_FISH[i];
      var card = document.createElement('div');
      card.className = 'fish-card';

      // 4x zoomed sprite
      var sprite = document.createElement('div');
      sprite.className = 'sprite-big';
      sprite.style.backgroundImage = 'url(' + SHEET_PATH + ')';
      sprite.style.backgroundSize = (SHEET_W * 4) + 'px ' + (SHEET_H * 4) + 'px';
      sprite.style.backgroundPosition = (-fish.x * 4) + 'px ' + (-fish.y * 4) + 'px';
      sprite.setAttribute('data-x', fish.x);
      sprite.setAttribute('data-y', fish.y);

      var name = document.createElement('div');
      name.className = 'fish-name';
      name.textContent = fish.name;

      var meta = document.createElement('div');
      meta.className = 'fish-meta';
      meta.innerHTML = 'Lv ' + fish.level + ' | HP ' + fish.hp + ' | XP ' + fish.xp;

      var coord = document.createElement('div');
      coord.className = 'fish-coord';
      coord.textContent = 'x:' + fish.x + ' y:' + fish.y;

      card.appendChild(sprite);
      card.appendChild(name);
      card.appendChild(meta);
      card.appendChild(coord);
      grid.appendChild(card);
    }

    section.appendChild(grid);
    container.appendChild(section);
  }

  // ========= SECTION 2: Full Row Scan (rows 29-30) =========
  function buildRowScan() {
    var container = document.getElementById('row-scan-section');
    var section = document.createElement('div');
    section.className = 'section row-scan';

    var h2 = document.createElement('h2');
    h2.textContent = 'Full Row Scan — Rows 29-30 (all fish sprites on sheet)';
    section.appendChild(h2);

    var desc = document.createElement('div');
    desc.className = 'section-desc';
    desc.textContent = 'Every 16x16 tile in fish rows. Blue border = currently used. Look for unused sprites or better alternatives.';
    section.appendChild(desc);

    // Row 29 (y=464)
    var label29 = document.createElement('div');
    label29.className = 'row-label';
    label29.textContent = 'Row 29 (y=464) — Small/Medium Fish';
    section.appendChild(label29);

    var grid29 = document.createElement('div');
    grid29.className = 'fish-grid';
    for (var col = 0; col < COLS; col++) {
      var x = col * TILE;
      var y = 464;
      var key = x + ',' + y;
      var card = document.createElement('div');
      card.className = 'row-card' + (usedCoords[key] ? ' in-use' : '');

      var sprite = document.createElement('div');
      sprite.className = 'sprite-sm';
      sprite.style.backgroundImage = 'url(' + SHEET_PATH + ')';
      sprite.style.backgroundSize = (SHEET_W * 3) + 'px ' + (SHEET_H * 3) + 'px';
      sprite.style.backgroundPosition = (-x * 3) + 'px ' + (-y * 3) + 'px';
      sprite.setAttribute('data-x', x);
      sprite.setAttribute('data-y', y);

      var idLabel = document.createElement('span');
      idLabel.className = 'rc-id';
      idLabel.textContent = '#' + (29 * COLS + col + 1) + (usedCoords[key] ? ' (' + usedCoords[key] + ')' : '');

      card.appendChild(sprite);
      card.appendChild(idLabel);
      grid29.appendChild(card);
    }
    section.appendChild(grid29);

    // Row 30 (y=480)
    var label30 = document.createElement('div');
    label30.className = 'row-label';
    label30.textContent = 'Row 30 (y=480) — Large Fish & Seafood';
    section.appendChild(label30);

    var grid30 = document.createElement('div');
    grid30.className = 'fish-grid';
    for (var col2 = 0; col2 < COLS; col2++) {
      var x2 = col2 * TILE;
      var y2 = 480;
      var key2 = x2 + ',' + y2;
      var card2 = document.createElement('div');
      card2.className = 'row-card' + (usedCoords[key2] ? ' in-use' : '');

      var sprite2 = document.createElement('div');
      sprite2.className = 'sprite-sm';
      sprite2.style.backgroundImage = 'url(' + SHEET_PATH + ')';
      sprite2.style.backgroundSize = (SHEET_W * 3) + 'px ' + (SHEET_H * 3) + 'px';
      sprite2.style.backgroundPosition = (-x2 * 3) + 'px ' + (-y2 * 3) + 'px';
      sprite2.setAttribute('data-x', x2);
      sprite2.setAttribute('data-y', y2);

      var idLabel2 = document.createElement('span');
      idLabel2.className = 'rc-id';
      idLabel2.textContent = '#' + (30 * COLS + col2 + 1) + (usedCoords[key2] ? ' (' + usedCoords[key2] + ')' : '');

      card2.appendChild(sprite2);
      card2.appendChild(idLabel2);
      grid30.appendChild(card2);
    }
    section.appendChild(grid30);

    // Row 31 (y=496) — shells, starfish, coral continuation
    var label31 = document.createElement('div');
    label31.className = 'row-label';
    label31.textContent = 'Row 31 (y=496) — Shells, Starfish, Coral';
    section.appendChild(label31);

    var grid31 = document.createElement('div');
    grid31.className = 'fish-grid';
    for (var col3 = 0; col3 < COLS; col3++) {
      var x3 = col3 * TILE;
      var y3 = 496;
      var card3 = document.createElement('div');
      card3.className = 'row-card';

      var sprite3 = document.createElement('div');
      sprite3.className = 'sprite-sm';
      sprite3.style.backgroundImage = 'url(' + SHEET_PATH + ')';
      sprite3.style.backgroundSize = (SHEET_W * 3) + 'px ' + (SHEET_H * 3) + 'px';
      sprite3.style.backgroundPosition = (-x3 * 3) + 'px ' + (-y3 * 3) + 'px';
      sprite3.setAttribute('data-x', x3);
      sprite3.setAttribute('data-y', y3);

      var idLabel3 = document.createElement('span');
      idLabel3.className = 'rc-id';
      idLabel3.textContent = '#' + (31 * COLS + col3 + 1);

      card3.appendChild(sprite3);
      card3.appendChild(idLabel3);
      grid31.appendChild(card3);
    }
    section.appendChild(grid31);

    container.appendChild(section);
  }

  // ========= SECTION 3: Extra Fishing Items =========
  function buildExtras() {
    var container = document.getElementById('extras-section');
    var section = document.createElement('div');
    section.className = 'section extras';

    var h2 = document.createElement('h2');
    h2.textContent = 'Extra Fishing Items (bait, shells, seafood, coral)';
    section.appendChild(h2);

    var desc = document.createElement('div');
    desc.className = 'section-desc';
    desc.textContent = 'Potential items for bait system, fishing loot, or shop items. Row 12 (seafood) + Row 31 (shells/coral).';
    section.appendChild(desc);

    var grid = document.createElement('div');
    grid.className = 'fish-grid';

    for (var i = 0; i < EXTRA_ITEMS.length; i++) {
      var item = EXTRA_ITEMS[i];
      var card = document.createElement('div');
      card.className = 'extra-card';

      var sprite = document.createElement('div');
      sprite.className = 'sprite-med';
      sprite.style.backgroundImage = 'url(' + SHEET_PATH + ')';
      sprite.style.backgroundSize = (SHEET_W * 3) + 'px ' + (SHEET_H * 3) + 'px';
      sprite.style.backgroundPosition = (-item.x * 3) + 'px ' + (-item.y * 3) + 'px';
      sprite.setAttribute('data-x', item.x);
      sprite.setAttribute('data-y', item.y);

      var idLabel = document.createElement('div');
      idLabel.className = 'item-id';
      idLabel.textContent = '#' + item.id + ' (' + item.x + ',' + item.y + ')';

      var nameLabel = document.createElement('div');
      nameLabel.className = 'item-name';
      nameLabel.textContent = item.name;

      card.appendChild(sprite);
      card.appendChild(idLabel);
      card.appendChild(nameLabel);
      grid.appendChild(card);
    }

    section.appendChild(grid);
    container.appendChild(section);
  }

  // ========= Zoom tooltip =========
  document.addEventListener('mousemove', function(e) {
    var target = e.target;
    if (!target.classList.contains('sprite-big') &&
        !target.classList.contains('sprite-med') &&
        !target.classList.contains('sprite-sm')) {
      zoomTip.style.display = 'none';
      return;
    }
    var x = parseInt(target.getAttribute('data-x'), 10);
    var y = parseInt(target.getAttribute('data-y'), 10);
    zoomTip.style.display = 'block';
    zoomTip.style.backgroundImage = 'url(' + SHEET_PATH + ')';
    zoomTip.style.backgroundSize = (SHEET_W * 8) + 'px ' + (SHEET_H * 8) + 'px';
    zoomTip.style.backgroundPosition = (-x * 8) + 'px ' + (-y * 8) + 'px';

    var tx = e.clientX + 16;
    var ty = e.clientY - 64;
    if (tx + 132 > window.innerWidth) tx = e.clientX - 144;
    if (ty < 4) ty = 4;
    zoomTip.style.left = tx + 'px';
    zoomTip.style.top = ty + 'px';
  });

  // Build all sections
  buildCurrentFish();
  buildRowScan();
  buildExtras();
})();
</script>
</body>
</html>
