<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Sprite Picker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #b0b0b0;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  padding: 16px;
}
h1 { color: #4a4; font-size: 20px; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
h2 { color: #4af; font-size: 16px; margin: 16px 0 8px; }
h3 { color: #8f8; font-size: 14px; margin: 12px 0 6px; }

/* Source sheets */
.sheet-section {
  border: 1px solid #333;
  border-radius: 4px;
  margin-bottom: 16px;
  background: #111;
  padding: 10px;
}
.sheet-label {
  color: #fa8;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 6px;
}
.sheet-dims { color: #666; font-size: 11px; margin-bottom: 8px; }
.sheet-canvas-wrap {
  position: relative;
  display: inline-block;
  border: 1px solid #444;
  cursor: crosshair;
  background: repeating-conic-gradient(#222 0% 25%, #1a1a1a 0% 50%) 0 0 / 16px 16px;
}
.sheet-canvas-wrap canvas {
  display: block;
  image-rendering: pixelated;
}
.selection-box {
  position: absolute;
  border: 2px solid #ff0;
  background: rgba(255,255,0,0.1);
  pointer-events: none;
  z-index: 5;
}
.crop-info {
  color: #ff0;
  font-size: 11px;
  margin-top: 4px;
}

/* Preview panel */
.preview-panel {
  position: sticky;
  top: 16px;
  border: 2px solid #4a4;
  border-radius: 6px;
  background: #0d0d0d;
  padding: 12px;
  margin-bottom: 16px;
}
.preview-strip {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.preview-slot {
  width: 100px;
  border: 1px solid #333;
  border-radius: 4px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: #111;
  cursor: pointer;
  transition: border-color 0.2s;
}
.preview-slot.active { border-color: #ff0; box-shadow: 0 0 8px rgba(255,255,0,0.3); }
.preview-slot.filled { border-color: #4a4; }
.preview-slot.filled.stump-slot { border-color: #fa8; }
.preview-slot.filled.deco-slot { border-color: #4af; }
.preview-slot .slot-canvas {
  width: 64px;
  height: 64px;
  image-rendering: pixelated;
  background: repeating-conic-gradient(#222 0% 25%, #1a1a1a 0% 50%) 0 0 / 8px 8px;
}
.preview-slot .slot-name {
  font-size: 11px;
  color: #ccc;
  text-align: center;
}
.preview-slot .slot-coords {
  font-size: 10px;
  color: #666;
}

/* Controls */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}
.toolbar button {
  background: #1a1a1a;
  color: #8f8;
  border: 1px solid #333;
  padding: 6px 14px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  border-radius: 3px;
}
.toolbar button:hover { background: #252525; border-color: #8f8; }
.toolbar button.danger { color: #f88; }
.toolbar button.danger:hover { border-color: #f88; }
.toolbar .active-slot-label {
  color: #ff0;
  font-size: 13px;
  font-weight: bold;
}

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

/* Zoom tooltip */
.zoom-tip {
  position: fixed;
  width: 192px;
  height: 192px;
  border: 2px solid #4af;
  background: #0a0a0a;
  pointer-events: none;
  z-index: 9999;
  display: none;
  border-radius: 3px;
  image-rendering: pixelated;
  overflow: hidden;
}
.zoom-tip canvas {
  image-rendering: pixelated;
}
</style>
</head>
<body>

<h1>Tree Sprite Picker</h1>
<p style="color:#888;margin-bottom:12px;">Click a slot below to select it, then click-drag on any source sheet to crop that tree. Zoom follows cursor.</p>

<div class="toolbar" id="toolbar">
  <span class="active-slot-label" id="active-label">Active: Pine</span>
  <button id="btn-export">Export pack-tree-sprites.py</button>
  <button id="btn-export-json">Export JSON</button>
  <button class="danger" id="btn-clear">Clear All</button>
</div>

<div class="preview-panel" id="preview-panel">
  <h3>Tree, Stump &amp; Decoration Slots (click to select, then crop from sheets below)</h3>
  <div class="preview-strip" id="preview-strip"></div>
</div>

<div class="layout" id="sheets-container"></div>
<div class="zoom-tip" id="zoom-tip"><canvas width="192" height="192"></canvas></div>

<script>
(function() {
  'use strict';

  var TREE_NAMES = ['Pine', 'Oak', 'Birch', 'Maple', 'Walnut', 'Mahogany', 'Yew', 'Elder'];
  var STUMP_NAMES = ['Pine Stump', 'Oak Stump', 'Birch Stump', 'Maple Stump', 'Walnut Stump', 'Mahogany Stump', 'Yew Stump', 'Elder Stump'];
  var DECO_NAMES = ['Deco 1', 'Deco 2', 'Deco 3', 'Deco 4', 'Deco 5', 'Deco 6'];
  var ALL_NAMES = TREE_NAMES.concat(STUMP_NAMES).concat(DECO_NAMES);
  var TOTAL_SLOTS = ALL_NAMES.length;
  var SCALE = 4; // display scale for source sheets

  // Local copies in tools/tree-sources/ (no spaces/special chars)
  var SHEETS = [
    { name: 'Pine Tree', path: 'tree-sources/pine.png' },
    { name: 'Birch Tree', path: 'tree-sources/birch.png' },
    { name: 'Maple Tree', path: 'tree-sources/maple.png' },
    { name: 'Mahogany Tree', path: 'tree-sources/mahogany.png' },
    { name: 'Deep Forest Tree', path: 'tree-sources/deepforest.png' },
    { name: 'Mushroom Tree', path: 'tree-sources/mushroom.png' },
    { name: 'Mine Tree', path: 'tree-sources/mine.png' },
    { name: 'Cherry Tree', path: 'tree-sources/cherry.png' },
    { name: 'Apple Tree', path: 'tree-sources/apple.png' },
    { name: 'Tree Trunks/Stumps', path: 'tree-sources/trunks.png' },
    { name: 'Big Old Tree (logs/stumps)', path: 'tree-sources/bigoldtree.png' },
    { name: 'Bushes', path: 'tree-sources/bushes.png' },
    { name: 'Root/Vines', path: 'tree-sources/root.png' }
  ];

  // State: all slots, each { sheetIdx, x, y, w, h } or null
  var slots = new Array(TOTAL_SLOTS);
  for (var i = 0; i < TOTAL_SLOTS; i++) slots[i] = null;
  var activeSlot = 0;

  // DOM
  var previewStrip = document.getElementById('preview-strip');
  var sheetsContainer = document.getElementById('sheets-container');
  var activeLabel = document.getElementById('active-label');
  var zoomTip = document.getElementById('zoom-tip');
  var zoomCtx = zoomTip.querySelector('canvas').getContext('2d');

  // Loaded images
  var sheetImages = [];
  var sheetCanvases = [];

  // Build preview slots in 3 groups
  var slotEls = [];
  var slotCanvases = [];

  function buildSlotGroup(label, names, startIdx, color, extraClass) {
    var groupDiv = document.createElement('div');
    groupDiv.style.marginBottom = '10px';
    var groupLabel = document.createElement('div');
    groupLabel.textContent = label;
    groupLabel.style.color = color;
    groupLabel.style.fontWeight = 'bold';
    groupLabel.style.fontSize = '12px';
    groupLabel.style.marginBottom = '4px';
    groupDiv.appendChild(groupLabel);
    var row = document.createElement('div');
    row.className = 'preview-strip';
    for (var si = 0; si < names.length; si++) {
      var idx = startIdx + si;
      var slot = document.createElement('div');
      slot.className = 'preview-slot' + (idx === 0 ? ' active' : '') + (extraClass ? ' ' + extraClass : '');
      slot.setAttribute('data-slot', idx);
      var cv = document.createElement('canvas');
      cv.width = 64; cv.height = 64;
      cv.className = 'slot-canvas';
      var nm = document.createElement('div');
      nm.className = 'slot-name';
      nm.textContent = names[si];
      var coords = document.createElement('div');
      coords.className = 'slot-coords';
      coords.textContent = '(empty)';
      coords.id = 'slot-coords-' + idx;
      slot.appendChild(cv);
      slot.appendChild(nm);
      slot.appendChild(coords);
      row.appendChild(slot);
      slotEls[idx] = slot;
      slotCanvases[idx] = cv.getContext('2d');

      slot.addEventListener('click', (function(i) {
        return function() { activeSlot = i; updateActiveSlot(); };
      })(idx));
    }
    groupDiv.appendChild(row);
    previewStrip.appendChild(groupDiv);
  }

  buildSlotGroup('Trees (full sprite)', TREE_NAMES, 0, '#8f8', '');
  buildSlotGroup('Stumps (cut-down state)', STUMP_NAMES, 8, '#fa8', 'stump-slot');
  buildSlotGroup('Decoration Trees', DECO_NAMES, 16, '#4af', 'deco-slot');

  function updateActiveSlot() {
    for (var i = 0; i < TOTAL_SLOTS; i++) {
      if (slotEls[i]) slotEls[i].classList.toggle('active', i === activeSlot);
    }
    activeLabel.textContent = 'Active: ' + ALL_NAMES[activeSlot];
  }

  function renderSlotPreview(idx) {
    var ctx = slotCanvases[idx];
    ctx.clearRect(0, 0, 64, 64);
    var s = slots[idx];
    var coordsEl = document.getElementById('slot-coords-' + idx);
    if (!s) {
      slotEls[idx].classList.remove('filled');
      if (coordsEl) coordsEl.textContent = '(empty)';
      return;
    }
    slotEls[idx].classList.add('filled');
    var img = sheetImages[s.sheetIdx];
    if (!img) return;
    // Draw scaled to fit 64x64
    var scale = Math.min(64 / s.w, 64 / s.h);
    var dw = Math.round(s.w * scale);
    var dh = Math.round(s.h * scale);
    var dx = Math.round((64 - dw) / 2);
    var dy = 64 - dh; // bottom-aligned
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, s.x, s.y, s.w, s.h, dx, dy, dw, dh);
    if (coordsEl) coordsEl.textContent = SHEETS[s.sheetIdx].name + ' (' + s.x + ',' + s.y + ',' + s.w + 'x' + s.h + ')';
  }

  // Build sheet sections
  function buildSheets() {
    var loaded = 0;
    for (var i = 0; i < SHEETS.length; i++) {
      (function(idx) {
        var section = document.createElement('div');
        section.className = 'sheet-section';

        var label = document.createElement('div');
        label.className = 'sheet-label';
        label.textContent = SHEETS[idx].name;
        section.appendChild(label);

        var dims = document.createElement('div');
        dims.className = 'sheet-dims';
        dims.id = 'sheet-dims-' + idx;
        dims.textContent = 'Loading...';
        section.appendChild(dims);

        var wrap = document.createElement('div');
        wrap.className = 'sheet-canvas-wrap';
        wrap.setAttribute('data-sheet', idx);

        var canvas = document.createElement('canvas');
        wrap.appendChild(canvas);

        var selBox = document.createElement('div');
        selBox.className = 'selection-box';
        selBox.style.display = 'none';
        wrap.appendChild(selBox);

        var cropInfo = document.createElement('div');
        cropInfo.className = 'crop-info';
        cropInfo.id = 'crop-info-' + idx;
        section.appendChild(wrap);
        section.appendChild(cropInfo);
        sheetsContainer.appendChild(section);

        var img = new Image();
        sheetImages[idx] = img;
        img.onload = function() {
          canvas.width = img.width * SCALE;
          canvas.height = img.height * SCALE;
          var ctx = canvas.getContext('2d');
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          // Grid overlay
          ctx.strokeStyle = 'rgba(255,255,255,0.12)';
          ctx.lineWidth = 1;
          for (var gx = 0; gx <= img.width; gx += 16) {
            ctx.beginPath();
            ctx.moveTo(gx * SCALE + 0.5, 0);
            ctx.lineTo(gx * SCALE + 0.5, canvas.height);
            ctx.stroke();
          }
          for (var gy = 0; gy <= img.height; gy += 16) {
            ctx.beginPath();
            ctx.moveTo(0, gy * SCALE + 0.5);
            ctx.lineTo(canvas.width, gy * SCALE + 0.5);
            ctx.stroke();
          }
          // Stronger 32px grid
          ctx.strokeStyle = 'rgba(255,255,255,0.25)';
          for (var gx2 = 0; gx2 <= img.width; gx2 += 32) {
            ctx.beginPath();
            ctx.moveTo(gx2 * SCALE + 0.5, 0);
            ctx.lineTo(gx2 * SCALE + 0.5, canvas.height);
            ctx.stroke();
          }
          for (var gy2 = 0; gy2 <= img.height; gy2 += 32) {
            ctx.beginPath();
            ctx.moveTo(0, gy2 * SCALE + 0.5);
            ctx.lineTo(canvas.width, gy2 * SCALE + 0.5);
            ctx.stroke();
          }
          sheetCanvases[idx] = canvas;
          dims.textContent = img.width + 'x' + img.height + 'px (shown at ' + SCALE + 'x)';
          loaded++;
        };
        img.onerror = function() {
          dims.textContent = 'Failed to load';
          dims.style.color = '#f88';
        };
        img.src = SHEETS[idx].path;

        // Drag-to-select on the wrap
        var dragging = false;
        var startX = 0, startY = 0;

        wrap.addEventListener('mousedown', function(e) {
          if (e.button !== 0) return;
          dragging = true;
          var rect = canvas.getBoundingClientRect();
          startX = Math.floor((e.clientX - rect.left) / SCALE);
          startY = Math.floor((e.clientY - rect.top) / SCALE);
          selBox.style.display = 'block';
          selBox.style.left = (startX * SCALE) + 'px';
          selBox.style.top = (startY * SCALE) + 'px';
          selBox.style.width = '0px';
          selBox.style.height = '0px';
          e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
          if (!dragging) return;
          var rect = canvas.getBoundingClientRect();
          var mx = Math.floor((e.clientX - rect.left) / SCALE);
          var my = Math.floor((e.clientY - rect.top) / SCALE);
          var x1 = Math.min(startX, mx);
          var y1 = Math.min(startY, my);
          var x2 = Math.max(startX, mx);
          var y2 = Math.max(startY, my);
          selBox.style.left = (x1 * SCALE) + 'px';
          selBox.style.top = (y1 * SCALE) + 'px';
          selBox.style.width = ((x2 - x1) * SCALE) + 'px';
          selBox.style.height = ((y2 - y1) * SCALE) + 'px';
          var ci = document.getElementById('crop-info-' + idx);
          if (ci) ci.textContent = 'Crop: (' + x1 + ',' + y1 + ') ' + (x2 - x1) + 'x' + (y2 - y1) + ' -> ' + ALL_NAMES[activeSlot];
        });

        document.addEventListener('mouseup', function(e) {
          if (!dragging) return;
          dragging = false;
          var rect = canvas.getBoundingClientRect();
          var mx = Math.floor((e.clientX - rect.left) / SCALE);
          var my = Math.floor((e.clientY - rect.top) / SCALE);
          var x1 = Math.min(startX, mx);
          var y1 = Math.min(startY, my);
          var w = Math.max(startX, mx) - x1;
          var h = Math.max(startY, my) - y1;
          if (w > 2 && h > 2) {
            slots[activeSlot] = { sheetIdx: idx, x: x1, y: y1, w: w, h: h };
            renderSlotPreview(activeSlot);
            // Auto-advance to next empty slot
            for (var next = 0; next < TOTAL_SLOTS; next++) {
              var ni = (activeSlot + 1 + next) % TOTAL_SLOTS;
              if (!slots[ni]) { activeSlot = ni; updateActiveSlot(); break; }
            }
          }
          selBox.style.display = 'none';
        });

      })(i);
    }
  }

  // Zoom tooltip
  document.addEventListener('mousemove', function(e) {
    var wrap = e.target.closest('.sheet-canvas-wrap');
    if (!wrap) { zoomTip.style.display = 'none'; return; }
    var sheetIdx = parseInt(wrap.getAttribute('data-sheet'), 10);
    var img = sheetImages[sheetIdx];
    if (!img || !img.complete) { zoomTip.style.display = 'none'; return; }

    var canvas = wrap.querySelector('canvas');
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) / SCALE;
    var my = (e.clientY - rect.top) / SCALE;

    // Draw 24x24 source pixels around cursor, scaled 8x into 192x192
    var zoomScale = 8;
    var viewPx = 24;
    zoomCtx.imageSmoothingEnabled = false;
    zoomCtx.clearRect(0, 0, 192, 192);
    zoomCtx.drawImage(img,
      Math.max(0, mx - viewPx/2), Math.max(0, my - viewPx/2), viewPx, viewPx,
      0, 0, 192, 192
    );
    // Crosshair
    zoomCtx.strokeStyle = 'rgba(255,255,0,0.5)';
    zoomCtx.lineWidth = 1;
    zoomCtx.beginPath();
    zoomCtx.moveTo(96, 0); zoomCtx.lineTo(96, 192);
    zoomCtx.moveTo(0, 96); zoomCtx.lineTo(192, 96);
    zoomCtx.stroke();
    // Pixel coords
    zoomCtx.fillStyle = '#ff0';
    zoomCtx.font = '11px monospace';
    zoomCtx.fillText(Math.floor(mx) + ',' + Math.floor(my), 4, 186);

    zoomTip.style.display = 'block';
    var tx = e.clientX + 20;
    var ty = e.clientY - 96;
    if (tx + 200 > window.innerWidth) tx = e.clientX - 210;
    if (ty < 4) ty = 4;
    zoomTip.style.left = tx + 'px';
    zoomTip.style.top = ty + 'px';
  });

  // Export as Python script
  document.getElementById('btn-export').addEventListener('click', function() {
    var lines = [
      '#!/usr/bin/env python3',
      '"""Auto-generated tree packing script from tree-sprite-catalog.html"""',
      '',
      'from PIL import Image',
      'import os',
      '',
      'ASSET = "_asset-pack/Farm RPG - Tiny Asset Pack - (All in One)/Farm/Tree"',
      'CROPS_ASSET = "_asset-pack/Farm RPG - Tiny Asset Pack - (All in One)/Farm Crops"',
      'OUT = "static/images/skills/trees.png"',
      '',
      '# (source_relative_path, crop_left, crop_top, crop_w, crop_h, tree_name)',
      'TREES = ['
    ];
    for (var i = 0; i < TOTAL_SLOTS; i++) {
      var s = slots[i];
      if (!s) { lines.push('    # ' + ALL_NAMES[i] + ': NOT SET'); continue; }
      var src = SHEETS[s.sheetIdx].path.replace('../', '');
      lines.push('    ("' + src + '", ' + s.x + ', ' + s.y + ', ' + s.w + ', ' + s.h + ', "' + ALL_NAMES[i] + '"),');
    }
    lines.push(']');
    lines.push('');
    lines.push('# Find max dimensions');
    lines.push('max_w = max(t[3] for t in TREES if len(t) == 6)');
    lines.push('max_h = max(t[4] for t in TREES if len(t) == 6)');
    lines.push('CELL_W = max_w');
    lines.push('CELL_H = max_h');
    lines.push('');
    lines.push('composite = Image.new("RGBA", (CELL_W * 8, CELL_H), (0, 0, 0, 0))');
    lines.push('for i, entry in enumerate(TREES):');
    lines.push('    if len(entry) != 6: continue');
    lines.push('    path, cx, cy, cw, ch, name = entry');
    lines.push('    img = Image.open(path)');
    lines.push('    crop = img.crop((cx, cy, cx + cw, cy + ch))');
    lines.push('    # Bottom-align in cell');
    lines.push('    px = i * CELL_W + (CELL_W - cw) // 2');
    lines.push('    py = CELL_H - ch');
    lines.push('    composite.paste(crop, (px, py), crop)');
    lines.push('    print(f"{name}: col={i}, x={px}, y={py}, w={cw}, h={ch}")');
    lines.push('');
    lines.push('composite.save(OUT)');
    lines.push('print("Saved: " + OUT + " " + str(composite.size))');
    lines.push('print("Cell size: " + str(CELL_W) + "x" + str(CELL_H))');
    lines.push('print("\\nTREE_SPRITES JS map:")');
    lines.push('for i, entry in enumerate(TREES):');
    lines.push('    if len(entry) != 6: continue');
    lines.push('    path, cx, cy, cw, ch, name = entry');
    lines.push('    px = i * CELL_W + (CELL_W - cw) // 2');
    lines.push('    py = CELL_H - ch');
    lines.push("    print(\"    '\" + name + \"': { x: \" + str(px) + \", y: \" + str(py) + \", w: \" + str(cw) + \", h: \" + str(ch) + \" },\")");

    var blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'pack-tree-sprites.py'; a.click();
    URL.revokeObjectURL(url);
  });

  // Export JSON
  document.getElementById('btn-export-json').addEventListener('click', function() {
    var data = { version: 2, trees: [], stumps: [], decorations: [] };
    for (var i = 0; i < 8; i++) {
      var s = slots[i];
      data.trees.push({
        name: TREE_NAMES[i],
        source: s ? SHEETS[s.sheetIdx].name : null,
        sourcePath: s ? SHEETS[s.sheetIdx].path.replace('../', '') : null,
        crop: s ? { x: s.x, y: s.y, w: s.w, h: s.h } : null
      });
    }
    for (var i = 0; i < 8; i++) {
      var s = slots[8 + i];
      data.stumps.push({
        name: STUMP_NAMES[i],
        source: s ? SHEETS[s.sheetIdx].name : null,
        sourcePath: s ? SHEETS[s.sheetIdx].path.replace('../', '') : null,
        crop: s ? { x: s.x, y: s.y, w: s.w, h: s.h } : null
      });
    }
    for (var i = 0; i < DECO_NAMES.length; i++) {
      var s = slots[16 + i];
      data.decorations.push({
        name: DECO_NAMES[i],
        source: s ? SHEETS[s.sheetIdx].name : null,
        sourcePath: s ? SHEETS[s.sheetIdx].path.replace('../', '') : null,
        crop: s ? { x: s.x, y: s.y, w: s.w, h: s.h } : null
      });
    }
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'tree-crops.json'; a.click();
    URL.revokeObjectURL(url);
  });

  // Clear all
  document.getElementById('btn-clear').addEventListener('click', function() {
    if (!confirm('Clear all tree crops?')) return;
    for (var i = 0; i < TOTAL_SLOTS; i++) { slots[i] = null; renderSlotPreview(i); }
    activeSlot = 0;
    updateActiveSlot();
  });

  // Init
  buildSheets();
})();
</script>
</body>
</html>
