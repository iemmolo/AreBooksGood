{{ define "main" }}
<div class="rpg-page" id="rpg-page">

  <!-- ═══ Menu Screen ═══ -->
  <div class="rpg-screen" id="rpg-menu-screen">
    <div class="rpg-title-block">
      <h1 class="rpg-title">Jack's RPG Adventure</h1>
      <p class="rpg-subtitle">An OSRS-inspired idle RPG</p>
    </div>
    <div class="rpg-menu-buttons">
      <button class="rpg-btn rpg-btn-primary" id="rpg-btn-new">New Game</button>
      <button class="rpg-btn" id="rpg-btn-continue">Continue</button>
    </div>
    <div class="rpg-save-slots" id="rpg-save-slots" style="display:none">
      <h2 class="rpg-slots-heading">Save Slots</h2>
      <div class="rpg-slots-grid" id="rpg-slots-grid"></div>
      <button class="rpg-btn rpg-btn-back" id="rpg-slots-back">Back</button>
    </div>
  </div>

  <!-- ═══ Character Creation Screen ═══ -->
  <div class="rpg-screen" id="rpg-create-screen" style="display:none">
    <h2 class="rpg-screen-heading">Create Your Character</h2>
    <div class="rpg-create-form">
      <label class="rpg-label" for="rpg-name-input">Name</label>
      <input type="text" id="rpg-name-input" class="rpg-input" maxlength="16" placeholder="Enter name..." autocomplete="off">
      <div class="rpg-create-actions">
        <button class="rpg-btn rpg-btn-primary" id="rpg-btn-begin" disabled>Begin Adventure</button>
        <button class="rpg-btn rpg-btn-back" id="rpg-create-back">Back</button>
      </div>
    </div>
  </div>

  <!-- ═══ Game Screen (persistent 3-panel OSRS layout) ═══ -->
  <div class="rpg-screen" id="rpg-game-screen" style="display:none">
    <div class="rpg-game-topbar" id="rpg-game-topbar">
      <div class="rpg-game-topbar-info">
        <span class="rpg-game-topbar-name" id="rpg-game-topbar-name"></span>
        <span class="rpg-game-topbar-level" id="rpg-game-topbar-level">Total Lv: 5</span>
      </div>
      <button class="rpg-btn rpg-btn-small" id="rpg-btn-save-quit">Save &amp; Quit</button>
    </div>
    {{ partial "rpg-skills-panel.html" . }}

    <!-- OSRS-style bottom bar (chat + inventory panels combined) -->
    <div class="osrs-chatbox" id="osrs-chatbox" style="display:none">
      <div class="osrs-chatbox-header">
        <div class="osrs-chatbox-tabs">
          <button class="osrs-chatbox-tab active" data-chat-tab="game">Game</button>
          <button class="osrs-chatbox-tab" data-chat-tab="chat">Chat</button>
          <button class="osrs-chatbox-tab" data-chat-tab="quest">Quest</button>
        </div>
        <div class="osrs-chatbox-skill-actions" id="osrs-chatbox-skill-actions" style="display:none">
          <!-- #skills-perks-btn and #skills-log-btn moved here by rpg.js -->
        </div>
        <button class="rpg-map-return-btn" id="rpg-btn-map" style="display:none">&larr; World Map</button>
        <div class="osrs-chatbox-icons">
          <button class="osrs-tab" data-chat-tab="skills" title="Skills"></button>
          <button class="osrs-tab osrs-tab-center" data-chat-tab="inventory" title="Inventory"></button>
          <button class="osrs-tab" data-chat-tab="character" title="Character"></button>
          <button class="osrs-tab" data-chat-tab="milestones" title="Milestones"></button>
        </div>
        <button class="osrs-chatbox-toggle" id="osrs-chatbox-toggle" title="Minimize">&#9660;</button>
      </div>
      <div class="osrs-chatbox-body" id="osrs-chatbox-body">
        <div class="osrs-chat-pane" id="osrs-chat-game">
          <div class="osrs-chatbox-welcome" id="osrs-chatbox-welcome">
            Welcome, adventurer. Select a location on the map to begin your journey.
          </div>
          <!-- #skills-game-log gets moved here by rpg.js -->
        </div>
        <div class="osrs-chat-pane" id="osrs-chat-chat" style="display:none">
          <div class="osrs-chatbox-empty">No messages yet.</div>
        </div>
        <div class="osrs-chat-pane" id="osrs-chat-quest" style="display:none">
          <div class="osrs-chatbox-empty">No active quests.</div>
        </div>
        <div class="osrs-chat-pane" id="osrs-chat-skills" style="display:none"></div>
        <div class="osrs-chat-pane" id="osrs-chat-inventory" style="display:none"></div>
        <div class="osrs-chat-pane" id="osrs-chat-character" style="display:none"></div>
        <div class="osrs-chat-pane" id="osrs-chat-milestones" style="display:none"></div>
      </div>
    </div>
  </div>

</div>
{{ end }}
